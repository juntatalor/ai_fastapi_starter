apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: app
  labels:
    app: worker
spec:
  # Worker держит pgqueuer; без advisory-локов на periodic задачи — 1 реплика.
  # См. plan §H для расширения на N реплик.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: REGISTRY_PLACEHOLDER/app-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-env
          ports:
            - name: metrics
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: app
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 8001
      targetPort: metrics
