# ШАБЛОН секретов. Реальный Secret админ создаёт kubectl/CI отдельно.
# Никогда не коммить реальные значения.
apiVersion: v1
kind: Secret
metadata:
  name: app-env
  namespace: app
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://USER:PASSWORD@HOST:5432/DBNAME"
  PGQUEUER_DSN: "postgresql://USER:PASSWORD@HOST:5432/DBNAME"
  JWT_SECRET: "REPLACE-ME-32-CHARS-MIN"
  YANDEX_CLIENT_ID: ""
  YANDEX_CLIENT_SECRET: ""
  OPENAI_API_KEY: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
